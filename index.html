<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Todo App</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body class="p-10 bg-gray-100 flex justify-center items-center min-h-screen">
    <main class=" max-w-xl w-full flex flex-col justify-center items-center  gap-4  bg-white p-8 rounded-lg shadow">

        <header class="grid gap-2">
            <h1 class="text-3xl font-extrabold text-center">My Tasks</h1>
            <p class="text-center font-semibold">Organize your work and track progress</p>
        </header>
        <section class="grid gap-4 w-full">
            <form id="taskForm" class="flex flex-col sm:flex-row gap-3">
                <input
                    class="border border-gray-400 rounded outline-none px-4 py-2 flex-1 focus:border-black focus:ring-2"
                    type="text" id="taskInput" placeholder="Enter a new task...">
                <button type="submit"
                    class="sm:w-auto border rounded-md sm:px-2 py-1.5 font-semibold hover:cursor-pointer bg-gray-100 hover:bg-gray-200">+
                    Add</button>
            </form>
            <div class="grid gap-4">
                <input class="border border-gray-400 rounded outline-none p-2 focus:border-black focus:ring-2"
                    type="text" id="searchInput" placeholder="Search Tasks...">
                <div class="grid sm:grid-cols-3 gap-4">
                    <button
                        class="text-lg font-semibold border px-6 py-1 rounded bg-black text-white hover:cursor-pointer"
                        type="button" id="allFilterBtn">All</button>
                    <button
                        class="text-lg font-semibold border px-6 py-1 rounded bg-gray-100 hover:bg-gray-200 hover:cursor-pointer"
                        type="button" id="activeFilterBtn">Active</button>
                    <button
                        class="text-lg font-semibold border px-6 py-1 rounded bg-gray-100 hover:bg-gray-200 hover:cursor-pointer"
                        type="button" id="completedFilterBtn">Completed</button>
                </div>
                <div class="flex flex-col sm:flex-row justify-between">
                    <p>Total: <span id="totalCount">0</span></p>
                    <p>Active: <span id="activeCount">0</span></p>
                    <p>Completed: <span id="completedCount">0</span></p>
                </div>
            </div>
        </section>
        <button type="button" id="clearCompletedTaskBtn" class="border px-2 py-1 rounded bg-gray-100 hover:bg-gray-200 hover:cursor-pointer hover:shadow">Clear Completed Tasks</button>
        <ul class="w-full grid gap-3" id="taskList">
        </ul>
        <p class="text-center text-gray-500 border border-dashed rounded p-4 w-full" id="emptyMessage">No tasks yet. Add
            your first task above</p>
    </main>

    <script src="./script.js"></script>
</body>

</html>
